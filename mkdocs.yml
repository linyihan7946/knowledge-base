site_name: Knowledge Base Wiki
site_description: Markdown knowledge base with Wiki and RAG layers
site_author: Knowledge Base

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - footnotes
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details

plugins:
  - search:
      lang: zh

nav:
  - 首页: index.md
  - 构建日志: log.md
  - Wiki 规范: SCHEMA.md

not_in_nav: |
  concepts/**/*.md
  entities/**/*.md
  comparisons/**/*.md

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: ignore

extra:
  generator: false

docs_dir: docs
site_dir: site
exclude_docs: |
  **/.generated-by-prepare-wiki-docs
